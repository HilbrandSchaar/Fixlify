<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Outfit,sans-serif;color:#111827;background:#FAFAFA}a{text-decoration:none;color:inherit}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,250,250,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.06);padding:12px 0}
.ni{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.lo{display:flex;align-items:center;gap:8px}.loi{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#2563EB,#7C3AED);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}.lot{font-weight:700;font-size:20px}.nb{color:#2563EB;font-weight:600;font-size:13px}
.app{display:flex;min-height:100vh;padding-top:58px}
.ed{flex:0 0 520px;padding:24px;overflow-y:auto;height:calc(100vh - 58px);position:sticky;top:58px}
.pv{flex:1;background:#d1d5db;padding:24px;display:flex;justify-content:center;overflow-y:auto;height:calc(100vh - 58px);position:sticky;top:58px}
.prog{display:flex;gap:3px;margin-bottom:20px}.prg{flex:1;height:4px;border-radius:2px;background:#E5E7EB}.prg.a{background:#2563EB}.prg.d{background:#10B981}
.stp{display:none}.stp.a{display:block}.sc{font-size:11px;font-weight:600;color:#2563EB;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}.stl{font-size:20px;font-weight:800;margin-bottom:16px}
.fg{margin-bottom:12px}.fg label{display:block;font-size:12px;font-weight:600;margin-bottom:3px}.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:Outfit;color:#111827;background:#fff}input:focus,select:focus,textarea:focus{outline:none;border-color:#2563EB}textarea{resize:vertical;min-height:50px}select{appearance:none;cursor:pointer}
.pho{display:flex;align-items:center;gap:12px;margin-bottom:12px}.phc{width:60px;height:60px;border-radius:50%;border:2px dashed #E5E7EB;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;background:#f3f4f6;font-size:20px;color:#9CA3AF}.phc:hover{border-color:#2563EB}.phc img{width:100%;height:100%;object-fit:cover}
.ec{background:#f9fafb;border:1px solid #E5E7EB;border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative}.ec h4{font-size:14px;font-weight:700}.ec p{font-size:13px;color:#6B7280}.ec .ea{position:absolute;top:8px;right:8px;display:flex;gap:3px}.ec .ea button{width:24px;height:24px;border:none;border-radius:5px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}.eeb{background:rgba(37,99,235,.08);color:#2563EB}.deb{background:#fee2e2;color:#ef4444}
.aeb{width:100%;padding:8px;border:2px dashed #E5E7EB;border-radius:8px;background:none;color:#2563EB;font-weight:600;font-size:11px;cursor:pointer;font-family:Outfit;margin-top:4px}.aeb:hover{border-color:#2563EB}
.skr{display:flex;align-items:center;gap:6px;margin-bottom:5px;background:#f9fafb;padding:5px 8px;border-radius:5px}.skr input{flex:1;border:none;background:none;padding:2px 0;font-size:12px}.skr input:focus{outline:none}.skds{display:flex;gap:2px}.skdt{width:10px;height:10px;border-radius:50%;border:2px solid #E5E7EB;cursor:pointer}.skdt.f{border-color:#2563EB;background:#2563EB}.skrm{background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px}
.tpg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}.tpc{border:2px solid #E5E7EB;border-radius:8px;padding:6px;cursor:pointer;text-align:center}.tpc:hover{border-color:#2563EB}.tpc.a{border-color:#2563EB;background:rgba(37,99,235,.04)}.tpv{height:60px;border-radius:3px;margin-bottom:4px;overflow:hidden;display:flex}.tpn{font-size:10px;font-weight:600}
.clrs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}.clr{width:26px;height:26px;border-radius:6px;cursor:pointer;border:3px solid transparent}.clr:hover{transform:scale(1.1)}.clr.a{border-color:#111827}
.bnx{flex:1;padding:10px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:Outfit;cursor:pointer}
.bpx{padding:10px 16px;background:#fff;color:#111827;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;font-weight:600;font-family:Outfit;cursor:pointer}
.bdl{width:100%;padding:13px;background:#F97316;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:Outfit;cursor:pointer;margin-top:12px}.bdl:hover{opacity:.9}
.brw{display:flex;gap:8px;margin-top:16px}
.cvp{width:595px;min-height:842px;background:#fff;box-shadow:0 4px 30px rgba(0,0,0,.15);border-radius:3px;font-family:Outfit,sans-serif;font-size:11px;line-height:1.5;overflow:hidden;word-wrap:break-word;overflow-wrap:break-word}
.cvp div{word-wrap:break-word;overflow-wrap:break-word;max-width:100%}
@media(max-width:1024px){.app{flex-direction:column}.ed{flex:none;width:100%;height:auto;position:relative;top:0}.pv{height:auto;position:relative;top:0;padding:16px;overflow-x:auto}.cvp{width:595px;min-height:842px;transform-origin:top left;margin:0 auto}.tpg{grid-template-columns:repeat(3,1fr)}}@media(max-width:640px){.pv{padding:8px}.cvp{transform:scale(0.55);margin-bottom:-350px}}
@media(max-width:640px){.fr{grid-template-columns:1fr}.tpg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<nav><div class="ni"><a href="/" class="lo"><div class="loi">F</div><span class="lot">fixlify</span></a><a href="/" class="nb">&larr; Alle tools</a></div></nav>
<div class="app">
<div class="ed">
<div class="prog" id="prg"></div>
<div class="stp a" id="s0"><div class="sc">Stap 1 van 6</div><div class="stl">Persoonlijke gegevens</div>
<div class="pho"><div class="phc" id="pc" onclick="document.getElementById('pi').click()">&#128100;</div><input type="file" id="pi" accept="image/*" style="display:none" onchange="hPh(this)"><div><div style="font-size:11px;color:#9CA3AF">Foto uploaden</div><label style="font-size:11px;display:flex;align-items:center;gap:4px;margin-top:2px"><input type="checkbox" id="sp" checked onchange="R()" style="width:auto"> Tonen</label></div></div>
<div class="fr"><div class="fg"><label>Naam *</label><input id="fn" placeholder="Jan van der Berg" oninput="R()"></div><div class="fg"><label>Functietitel</label><input id="jt" placeholder="Grafisch Ontwerper" oninput="R()"></div></div>
<div class="fr"><div class="fg"><label>E-mail</label><input id="em" placeholder="jan@voorbeeld.nl" oninput="R()"></div><div class="fg"><label>Telefoon</label><input id="ph" placeholder="06-12345678" oninput="R()"></div></div>
<div class="fr"><div class="fg"><label>Woonplaats</label><input id="ct" placeholder="Amsterdam" oninput="R()"></div><div class="fg"><label>LinkedIn</label><input id="li" placeholder="linkedin.com/in/jvdberg" oninput="R()"></div></div>
<div class="brw"><div></div><button class="bnx" onclick="nxt()">Volgende &rarr;</button></div></div>

<div class="stp" id="s1"><div class="sc">Stap 2 van 6</div><div class="stl">Profiel</div>
<div class="fg"><label>Over mij</label><textarea id="pf" rows="3" placeholder="Gemotiveerde professional met 5+ jaar ervaring..." oninput="R()"></textarea></div>

<div class="stp" id="s2"><div class="sc">Stap 3 van 6</div><div class="stl">Werkervaring</div>
<div id="exl"></div><button class="aeb" onclick="aEx()">+ Werkervaring</button>
<div id="exf" style="display:none;margin-top:10px"><div class="fr"><div class="fg"><label>Functie</label><input id="xt"></div><div class="fg"><label>Bedrijf</label><input id="xc"></div></div><div class="fr"><div class="fg"><label>Start</label><input type="month" id="xs"></div><div class="fg"><label>Eind</label><input type="month" id="xe"></div></div><div class="fg"><label>Locatie</label><input id="xl"></div><div class="fg"><label>Beschrijving</label><textarea id="xd" rows="2"></textarea></div><div class="brw"><button class="bpx" onclick="cEx()">Annuleren</button><button class="bnx" onclick="sEx()">Opslaan</button></div></div>
<div class="brw"><button class="bpx" onclick="prv()">&larr;</button><button class="bnx" onclick="nxt()">Volgende &rarr;</button></div></div>

<div class="stp" id="s3"><div class="sc">Stap 4 van 6</div><div class="stl">Opleiding</div>
<div id="edl"></div><button class="aeb" onclick="aEd()">+ Opleiding</button>
<div id="edf" style="display:none;margin-top:10px"><div class="fr"><div class="fg"><label>Opleiding</label><input id="dt"></div><div class="fg"><label>School</label><input id="ds"></div></div><div class="fr"><div class="fg"><label>Start</label><input type="month" id="dss"></div><div class="fg"><label>Eind</label><input type="month" id="de"></div></div><div class="fg"><label>Beschrijving</label><textarea id="dd" rows="2"></textarea></div><div class="brw"><button class="bpx" onclick="cEd()">Annuleren</button><button class="bnx" onclick="sEd()">Opslaan</button></div></div>
<div class="brw"><button class="bpx" onclick="prv()">&larr;</button><button class="bnx" onclick="nxt()">Volgende &rarr;</button></div></div>

<div class="stp" id="s4"><div class="sc">Stap 5 van 6</div><div class="stl">Vaardigheden & Talen</div>
<div style="font-size:12px;font-weight:600;margin-bottom:4px">Vaardigheden</div><div id="skl"></div><button class="aeb" onclick="aSk()" style="margin-bottom:12px">+ Vaardigheid</button>
<div style="font-size:12px;font-weight:600;margin-bottom:4px">Talen</div><div id="lgl"></div><button class="aeb" onclick="aLg()">+ Taal</button>
<div class="brw"><button class="bpx" onclick="prv()">&larr;</button><button class="bnx" onclick="nxt()">Volgende &rarr;</button></div></div>

<div class="stp" id="s5"><div class="sc">Stap 6 van 6</div><div class="stl">Template & Design</div>
<div style="font-size:12px;font-weight:600;margin-bottom:4px">Template</div>
<div class="tpg">
<div class="tpc a" onclick="sTP('modern',this)"><div class="tpv" style="background:#1e3a5f"><div style="width:32%;background:rgba(255,255,255,.08)"></div><div style="flex:1;background:#fff"></div></div><div class="tpn">Modern</div></div>
<div class="tpc" onclick="sTP('exec',this)"><div class="tpv" style="flex-direction:column;border:1px solid #e5e7eb"><div style="height:30%;background:#1e3a5f"></div><div style="flex:1;background:#fff"></div></div><div class="tpn">Executive</div></div>
<div class="tpc" onclick="sTP('creative',this)"><div class="tpv" style="flex-direction:column;border:1px solid #e5e7eb"><div style="height:7px;background:#e24b4a"></div><div style="flex:1;background:#fff"></div></div><div class="tpn">Creatief</div></div>
<div class="tpc" onclick="sTP('minimal',this)"><div class="tpv" style="flex-direction:column;border:1px solid #e5e7eb;padding:6px"><div style="height:6px;width:50%;background:#ddd;margin-bottom:3px"></div><div style="height:1px;background:#eee"></div></div><div class="tpn">Minimalist</div></div>
<div class="tpc" onclick="sTP('classic',this)"><div class="tpv" style="flex-direction:column;border:1px solid #e5e7eb;padding:4px;align-items:center"><div style="height:5px;width:40%;background:#333;margin-bottom:2px"></div><div style="height:1px;width:60%;background:#e5e7eb"></div></div><div class="tpn">Klassiek</div></div>
</div>
<div style="font-size:12px;font-weight:600;margin-bottom:4px">Kleur</div>
<div class="clrs">
<div class="clr a" style="background:#2563EB" data-c="#2563EB" onclick="sCol(this)"></div>
<div class="clr" style="background:#1e3a5f" data-c="#1e3a5f" onclick="sCol(this)"></div>
<div class="clr" style="background:#7C3AED" data-c="#7C3AED" onclick="sCol(this)"></div>
<div class="clr" style="background:#059669" data-c="#059669" onclick="sCol(this)"></div>
<div class="clr" style="background:#DC2626" data-c="#DC2626" onclick="sCol(this)"></div>
<div class="clr" style="background:#D97706" data-c="#D97706" onclick="sCol(this)"></div>
<div class="clr" style="background:#0891B2" data-c="#0891B2" onclick="sCol(this)"></div>
<div class="clr" style="background:#BE185D" data-c="#BE185D" onclick="sCol(this)"></div>
<div class="clr" style="background:#111827" data-c="#111827" onclick="sCol(this)"></div>
</div>
<div class="brw"><button class="bpx" onclick="prv()">&larr;</button></div>
<button class="bdl" onclick="dlPDF()">&#128196; Download CV als PDF</button>
</div>
</div>
<div class="pv"><div class="cvp" id="cvp"></div></div>
</div>
<script>
let step=0,tpl='modern',col='#2563EB',photo=null,exps=[],edus=[],skills=[],langs=[],exi=-1,edi=-1;
function uP(){let p=document.getElementById('prg');p.innerHTML='';for(let i=0;i<6;i++){let d=document.createElement('div');d.className='prg'+(i<step?' d':'')+(i===step?' a':'');p.appendChild(d)}}
function goS(n){for(let i=0;i<6;i++)document.getElementById('s'+i).classList.toggle('a',i===n);step=n;uP()}
function nxt(){if(step<5){goS(step+1);document.querySelector('.ed').scrollTop=0}}
function prv(){if(step>0){goS(step-1);document.querySelector('.ed').scrollTop=0}}
function hPh(i){let f=i.files[0];if(!f)return;let r=new FileReader;r.onload=function(e){photo=e.target.result;document.getElementById('pc').innerHTML='<img src="'+photo+'">';R()};r.readAsDataURL(f)}
function sTP(t,el){tpl=t;document.querySelectorAll('.tpc').forEach(function(e){e.classList.remove('a')});el.classList.add('a');R()}
function sCol(el){document.querySelectorAll('.clr').forEach(function(e){e.classList.remove('a')});el.classList.add('a');col=el.dataset.c;R()}
function rExL(){let c=document.getElementById('exl');c.innerHTML='';exps.forEach(function(e,i){c.innerHTML+='<div class="ec"><h4>'+e.t+' — '+e.c+'</h4><p>'+fD(e.s)+' - '+(e.e?fD(e.e):'heden')+'</p><div class="ea"><button class="eeb" onclick="eEx('+i+')">&#9998;</button><button class="deb" onclick="dEx('+i+')">&times;</button></div></div>'})}
function aEx(){document.getElementById('exf').style.display='block';exi=-1;['xt','xc','xs','xe','xl','xd'].forEach(function(x){document.getElementById(x).value=''})}
function eEx(i){exi=i;let e=exps[i];document.getElementById('exf').style.display='block';document.getElementById('xt').value=e.t;document.getElementById('xc').value=e.c;document.getElementById('xs').value=e.s;document.getElementById('xe').value=e.e;document.getElementById('xl').value=e.l;document.getElementById('xd').value=e.d}
function cEx(){document.getElementById('exf').style.display='none'}
function sEx(){let e={t:document.getElementById('xt').value,c:document.getElementById('xc').value,s:document.getElementById('xs').value,e:document.getElementById('xe').value,l:document.getElementById('xl').value,d:document.getElementById('xd').value};if(exi>=0)exps[exi]=e;else exps.push(e);cEx();rExL();R()}
function dEx(i){exps.splice(i,1);rExL();R()}
function rEdL(){let c=document.getElementById('edl');c.innerHTML='';edus.forEach(function(e,i){c.innerHTML+='<div class="ec"><h4>'+e.t+' — '+e.s+'</h4><p>'+fD(e.ss)+' - '+(e.e?fD(e.e):'')+'</p><div class="ea"><button class="eeb" onclick="eEd('+i+')">&#9998;</button><button class="deb" onclick="dEd('+i+')">&times;</button></div></div>'})}
function aEd(){document.getElementById('edf').style.display='block';edi=-1;['dt','ds','dss','de','dd'].forEach(function(x){document.getElementById(x).value=''})}
function eEd(i){edi=i;let e=edus[i];document.getElementById('edf').style.display='block';document.getElementById('dt').value=e.t;document.getElementById('ds').value=e.s;document.getElementById('dss').value=e.ss;document.getElementById('de').value=e.e;document.getElementById('dd').value=e.d}
function cEd(){document.getElementById('edf').style.display='none'}
function sEd(){let e={t:document.getElementById('dt').value,s:document.getElementById('ds').value,ss:document.getElementById('dss').value,e:document.getElementById('de').value,d:document.getElementById('dd').value};if(edi>=0)edus[edi]=e;else edus.push(e);cEd();rEdL();R()}
function dEd(i){edus.splice(i,1);rEdL();R()}
function rSkL(){let c=document.getElementById('skl');c.innerHTML='';skills.forEach(function(s,i){let ds='';for(let d=1;d<=5;d++)ds+='<div class="skdt'+(d<=s.l?' f':'')+'" onclick="sSkL('+i+','+d+')" style="'+(d<=s.l?'border-color:'+col+';background:'+col:'')+'"></div>';c.innerHTML+='<div class="skr"><input value="'+s.n+'" oninput="skills['+i+'].n=this.value;R()"><div class="skds">'+ds+'</div><button class="skrm" onclick="skills.splice('+i+',1);rSkL();R()">&times;</button></div>'})}
function aSk(){skills.push({n:'',l:3});rSkL();R()}
function sSkL(i,l){skills[i].l=l;rSkL();R()}
function rLgL(){let c=document.getElementById('lgl');c.innerHTML='';langs.forEach(function(l,i){c.innerHTML+='<div class="skr"><input value="'+l.n+'" oninput="langs['+i+'].n=this.value;R()"><select onchange="langs['+i+'].l=this.value;R()" style="width:110px"><option'+(l.l==='Moedertaal'?' selected':'')+'>Moedertaal</option><option'+(l.l==='Vloeiend'?' selected':'')+'>Vloeiend</option><option'+(l.l==='Goed'?' selected':'')+'>Goed</option><option'+(l.l==='Basis'?' selected':'')+'>Basis</option></select><button class="skrm" onclick="langs.splice('+i+',1);rLgL();R()">&times;</button></div>'})}
function aLg(){langs.push({n:'',l:'Goed'});rLgL();R()}
function fD(d){if(!d)return'';let p=d.split('-');let ms=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];return ms[parseInt(p[1])-1]+' '+p[0]}
function gCV(){return{nm:document.getElementById('fn').value||'Je Naam',jt:document.getElementById('jt').value,em:document.getElementById('em').value,ph:document.getElementById('ph').value,ct:document.getElementById('ct').value,ln:document.getElementById('li').value,pf:document.getElementById('pf').value,sp:document.getElementById('sp').checked}}
function dots(lv,fc,ec){let h='';for(let i=1;i<=5;i++)h+='<div style="width:7px;height:7px;border-radius:50%;display:inline-block;margin:0 1px;background:'+(i<=lv?fc:ec)+'"></div>';return h}
function secH(d,c){let h='';if(d.pf)h+='<div style="margin-bottom:14px"><div style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid '+c+'">Profiel</div><div style="font-size:13px;color:#444;line-height:1.6">'+d.pf+'</div></div>';if(exps.length)h+='<div style="margin-bottom:14px"><div style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid '+c+'">Werkervaring</div>'+exps.map(function(e){return'<div style="margin-bottom:8px"><div style="font-size:14px;font-weight:700">'+e.t+'</div><div style="font-size:13px;color:#6B7280">'+e.c+(e.l?' | '+e.l:'')+' | '+fD(e.s)+' - '+(e.e?fD(e.e):'heden')+'</div>'+(e.d?'<div style="font-size:13px;color:#444;margin-top:1px;line-height:1.5">'+e.d+'</div>':'')+'</div>'}).join('')+'</div>';if(edus.length)h+='<div style="margin-bottom:14px"><div style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid '+c+'">Opleiding</div>'+edus.map(function(e){return'<div style="margin-bottom:8px"><div style="font-size:14px;font-weight:700">'+e.t+'</div><div style="font-size:13px;color:#6B7280">'+e.s+' | '+fD(e.ss)+' - '+(e.e?fD(e.e):'')+'</div>'+(e.d?'<div style="font-size:13px;color:#444;margin-top:1px">'+e.d+'</div>':'')+'</div>'}).join('')+'</div>';return h}

function dlPDF(){
  var el=document.getElementById('cvp');
  var origW=el.style.width;
  var origH=el.style.minHeight;
  var origT=el.style.transform;
  var origMb=el.style.marginBottom;
  el.style.width='595px';
  el.style.minHeight='842px';
  el.style.transform='none';
  el.style.marginBottom='0';
  setTimeout(function(){
    html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff',windowWidth:595}).then(function(canvas){
      var imgData=canvas.toDataURL('image/jpeg',0.98);
      var J=window.jspdf.jsPDF;
      var pdf=new J('p','mm','a4');
      var imgW=210;
      var imgH=canvas.height*imgW/canvas.width;
      if(imgH>297){imgH=297}
      pdf.addImage(imgData,'JPEG',0,0,imgW,imgH);
      var d=gCV();
      pdf.save('cv-'+d.nm.toLowerCase().replace(/\s+/g,'-')+'.pdf');
      el.style.width=origW;
      el.style.minHeight=origH;
      el.style.transform=origT;
      el.style.marginBottom=origMb;
    });
  },100);
}
function autoScale(){
  var el=document.getElementById('cvp');
  if(!el)return;
  var content=el.firstElementChild;
  if(!content)return;
  el.style.fontSize='11px';
  var h=content.scrollHeight;
  var target=842;
  var ratio=target/h;
  if(ratio>1.35)ratio=1.35;
  if(ratio<0.65)ratio=0.65;
  var base=11*ratio;
  if(base>14.5)base=14.5;
  if(base<7.5)base=7.5;
  el.style.fontSize=base+'px';
}
